name: Build & Test with Doppler

on:
  push:
    branches: [main, chore/refactor]
  pull_request:
    branches: [main, chore/refactor]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.17.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      
      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sh
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type Check
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c prod -- pnpm check
      
      - name: Lint
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c prod -- pnpm lint
      
      - name: Build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c prod -- pnpm build
      
      - name: Unit Tests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c prod -- pnpm test:unit
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: build-${{ matrix.node-version }}
          path: build/
          retention-days: 5

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.17.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'pnpm'
      
      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sh
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c prod -- pnpm exec playwright install --with-deps
      
      - name: Integration Tests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c prod -- pnpm test:integration

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/chore/refactor' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.17.1
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'pnpm'
      
      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sh
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build for Staging
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -p panama-stopover-site -c staging -- pnpm build
      
      - name: Deploy to Cloudflare Pages (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy build --project-name panama-stopover-staging
