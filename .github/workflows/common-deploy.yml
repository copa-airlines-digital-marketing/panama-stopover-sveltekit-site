name: Reusable Deploy Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment (development, testing, production)'
      environment_url:
        required: false
        type: string
        description: 'Environment URL for deployment tracking'
      aws_role:
        required: true
        type: string
        description: 'AWS IAM role ARN to assume'
      production_flag:
        required: false
        type: string
        default: ""
        description: 'Production environment flag'
      env:
        required: true
        type: string
        description: 'Short environment name (dev, test, prod)'
      build_environment:
        required: true
        type: string
        description: 'Environment value for build args'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Set up Node.js 20.11.1
      uses: actions/setup-node@v4
      with:
        node-version: '20.11.1'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role }}
        aws-region: ${{ vars.AWS_REGION }}

